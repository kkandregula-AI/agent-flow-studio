<div class="app-shell">
  <aside class="left-column">
    <section class="card brand-card">
      <div class="brand-row">
        <div class="brand-icon">AI</div>
        <div>
          <h1>AgentFlow Studio</h1>
          <p>Multi-agent orchestration playground</p>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Goal</h2>
      <textarea id="goalInput">Create a PRD outline for a privacy-first family expense tracker PWA for India.</textarea>

      <label>Orchestration Mode</label>
      <select id="mode">
        <option value="planner-first">Planner First</option>
        <option value="sequential">Sequential</option>
        <option value="parallel">Parallel</option>
        <option value="debate">Debate</option>
      </select>

      <label>Instruction Style</label>
      <select id="style">
        <option value="balanced">Balanced</option>
        <option value="concise">Concise</option>
        <option value="detailed">Detailed</option>
      </select>

      <button id="runWorkflow">Run Workflow</button>
    </section>

    <section class="card">
      <h2>Agents</h2>
      <div id="agentsList"></div>
    </section>

    <section class="card">
      <h2>Agent Metrics</h2>
      <div id="metrics"></div>
    </section>
  </aside>

  <main class="center-column">
    <section class="card">
      <div class="card-head">
        <h2>Execution Map</h2>
        <span class="status-pill success">Complete</span>
      </div>
      <div id="executionMap"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Live Feed</h2>
        <span class="muted-pill">Per-step timings and token cost</span>
      </div>
      <div id="feed"></div>
    </section>
  </main>

  <aside class="right-column">
    <section class="card">
      <h2>Shared Memory</h2>
      <div id="sharedMemory"></div>
    </section>

    <section class="card goal-card">
      <h2>Goal Output</h2>
      <div id="goalOutput"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Dynamic Flow Visualizer</h2>
        <span class="muted-pill">Live agent pulse</span>
      </div>
      <div id="visualizer"></div>
    </section>

    <section class="card">
      <h2>Workflow Summary</h2>
      <div id="workflowSummary"></div>
    </section>
  </aside>
</div>

<footer class="footer">
  Built by Krishnamurthy Kandregula
</footer>

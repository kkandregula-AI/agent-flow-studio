<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AgentFlow Studio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>AgentFlow Studio</h1>
<p>Multi-Agent AI Orchestration Playground</p>

<div class="container">

  <!-- LEFT -->
  <div class="panel">
    <h3>Goal</h3>
    <textarea id="goalInput">Create a PRD outline for a privacy-first family expense tracker PWA for India.</textarea>

    <h3>Mode</h3>
    <select id="mode">
      <option>Sequential</option>
      <option>Parallel</option>
      <option>Debate</option>
      <option>Planner First</option>
    </select>

    <button onclick="runWorkflow()">Run</button>
  </div>

  <!-- CENTER -->
  <div class="panel">
    <h3>Execution Map</h3>
    <div id="executionMap"></div>

    <div class="live-feed">
      <h3>Live Execution Feed</h3>
      <div id="feed"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h3>Agent Metrics</h3>
    <div id="metrics"></div>

    <h3>Flow Visualizer</h3>
    <div id="visualizer"></div>

    <div class="goal-output">
      <h3>✅ Goal Achieved Output</h3>
      <div id="goalOutput"></div>
    </div>
  </div>

</div>

<footer>
Built by Krishnamurthy Kandregula
</footer>

<script src="app.js"></script>

</body>
</html>
